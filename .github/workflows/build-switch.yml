name: Build GBAStation 3DS for Nintendo Switch

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - switch
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-switch:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Check out GBAStation_3DS source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch pinned private switchVK SDK
        id: switchvk
        shell: bash
        env:
          SWITCHVK_TOKEN: ${{ secrets.SWITCHVK_READ_TOKEN }}
          SWITCHVK_SHA256: ${{ vars.SWITCHVK_SHA256 }}
        run: bash ci/fetch-switchvk.sh "$RUNNER_TEMP/switchvk-sdk"

      - name: Build release NRO
        shell: bash
        run: bash build_switch_nro.sh clean release

      - name: Upload Nintendo Switch build
        uses: actions/upload-artifact@v4
        with:
          name: GBAStation-3DS-Switch-${{ github.sha }}
          path: GBAStation3DSStub.nro
          if-no-files-found: error
          retention-days: 30
